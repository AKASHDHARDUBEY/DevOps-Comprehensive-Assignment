services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  app:
    build: .
    container_name: app
    restart: unless-stopped
    ports:
      - "80:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/devops-app
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
